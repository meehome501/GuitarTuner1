<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Guitar Tuner</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      padding: 16px;
      overflow-x: hidden;
      gap: 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      align-self: flex-start;
      text-decoration: none;
      color: #e0e0f0;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50px;
      padding: 8px 18px 8px 12px;
      font-family: sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .back-btn:hover,
    .back-btn:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      outline: none;
    }

    .back-btn:active {
      transform: scale(0.96);
    }

    .back-btn svg {
      flex-shrink: 0;
    }

    .tuner-container {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      /* Maintain aspect ratio: 360 x 520 = ~1:1.444 */
      aspect-ratio: 360 / 520;
    }

    .tuner-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      border-radius: 4px;
    }

    /* ── Mobile phones (portrait, up to 430px wide) ── */
    @media screen and (max-width: 430px) {
      body {
        padding: 10px 8px 8px;
        gap: 10px;
      }
      .back-btn {
        font-size: 13px;
        padding: 7px 14px 7px 10px;
      }
      .tuner-container {
        max-width: 100%;
      }
    }

    /* ── iPad mini / iPad Air portrait (768px) ── */
    @media screen and (min-width: 431px) and (max-width: 834px) {
      body {
        padding: 24px;
        align-items: center;
        min-height: 100%;
      }
      .tuner-container {
        max-width: 400px;
      }
    }

    /* ── iPad Pro 11" portrait (834px) / iPad Pro 12.9" (1024px) ── */
    @media screen and (min-width: 835px) and (max-width: 1366px) {
      body {
        padding: 32px;
        align-items: center;
        min-height: 100%;
      }
      .tuner-container {
        max-width: 420px;
      }
    }

    /* ── iPad landscape: fill more of the screen height ── */
    @media screen and (orientation: landscape) and (max-height: 600px) {
      body {
        padding: 8px;
        align-items: flex-start;
      }
      .tuner-container {
        /* In landscape, constrain by height instead */
        max-width: none;
        width: auto;
        height: calc(100vh - 16px);
        aspect-ratio: 360 / 520;
      }
    }

    /* ── iPad Pro 12.9" landscape (1366 x 1024) ── */
    @media screen and (min-width: 1024px) and (orientation: landscape) {
      body {
        align-items: center;
        min-height: 100vh;
      }
      .tuner-container {
        height: calc(100vh - 64px);
        width: auto;
        max-width: none;
        aspect-ratio: 360 / 520;
      }
    }
  </style>
</head>
<body>
  <a href="http://meegame.thddns.net/chaichill1/" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    กลับหน้าหลัก
  </a>
  <div class="tuner-container">
    <iframe
      src="https://guitarapp.com/tuner.html?embed=true"
      allow="microphone"
      title="GuitarApp Online Tuner"
      loading="lazy"
    ></iframe>
  </div>
</body>
</html>
